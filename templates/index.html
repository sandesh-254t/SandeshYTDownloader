<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandesh YouTube Downloader | Nature Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a2e1f 0%, #1a4d2e 50%, #0d3b1f 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .leaf {
            position: fixed;
            font-size: 24px;
            opacity: 0.15;
            pointer-events: none;
            animation: floatLeaf 15s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes floatLeaf {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -30px) rotate(5deg); }
            50% { transform: translate(-15px, -50px) rotate(-5deg); }
            75% { transform: translate(10px, -20px) rotate(3deg); }
        }

        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: floatBlob 25s infinite ease-in-out;
            z-index: 0;
        }

        .blob-1 {
            background: radial-gradient(circle, #2ecc71, #27ae60);
            top: -300px;
            left: -300px;
        }

        .blob-2 {
            background: radial-gradient(circle, #1abc9c, #16a085);
            bottom: -300px;
            right: -300px;
            animation-delay: 5s;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 48px 40px;
            max-width: 700px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .glass-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(46, 204, 113, 0.4);
        }

        .developer-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            position: relative;
        }

        .avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(46, 204, 113, 0.6);
        }

        .avatar-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #2ecc71;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }

        .developer-info h3 {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .developer-info h3 span {
            background: rgba(46, 204, 113, 0.3);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #2ecc71;
        }

        .developer-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .developer-info p i {
            transition: all 0.2s;
        }

        .developer-info p i:hover {
            color: #2ecc71;
            transform: translateY(-2px);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a8e6cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(46, 204, 113, 0.6);
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 18px 18px 18px 52px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus {
            border-color: #2ecc71;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.2);
        }

        .download-btn {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .status.loading {
            display: flex;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .status.success {
            display: flex;
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.4);
            color: #55efc4;
        }

        .status.error {
            display: flex;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .features {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature {
            text-align: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .feature:hover {
            background: rgba(46, 204, 113, 0.15);
            transform: translateY(-3px);
        }

        .feature i {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
            color: #2ecc71;
        }

        .feature span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
        }

        .footer i {
            color: #e74c3c;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .glass-card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 26px;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .developer-section {
                flex-direction: column;
                text-align: center;
            }
            .developer-info p {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="leaf" style="top: 10%; left: 5%;">🍃</div>
    <div class="leaf" style="top: 70%; left: 85%;">🌿</div>
    <div class="leaf" style="top: 40%; left: 15%;">🍂</div>
    <div class="leaf" style="top: 80%; left: 20%;">🌱</div>
    <div class="leaf" style="top: 20%; left: 90%;">🍃</div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="glass-card">
            <div class="developer-section">
                <div class="avatar">
                    <img src="/static/san.jpg" class="avatar-img" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="avatar-badge">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
                <div class="developer-info">
                    <h3>Sandesh <span>@developer</span></h3>
                    <p>
                        <i class="fas fa-home"></i> Building cool stuff
                        <i class="fas fa-music"></i>
                        <i class="fas fa-headphones"></i>
                        <i class="fas fa-tree"></i>
                        <i class="fab fa-github"></i>
                        <i class="fab fa-twitter"></i>
                    </p>
                </div>
            </div>

            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-download"></i>
                </div>
                <h1>Sandesh YouTube Downloader</h1>
                <div class="tagline">
                    <i class="fab fa-youtube"></i>
                    Download any video in seconds
                    <i class="fas fa-leaf"></i>
                </div>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-link input-icon"></i>
                <input type="text" id="urlInput" placeholder="Paste YouTube link here..." autocomplete="off">
            </div>

            <button class="download-btn" id="downloadBtn">
                <i class="fas fa-download"></i>
                <span>Download Video</span>
            </button>

            <div id="status" class="status"></div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span>Lightning Fast</span>
                </div>
                <div class="feature">
                    <i class="fas fa-file-video"></i>
                    <span>MP4 Format</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>100% Safe</span>
                </div>
            </div>

            <div class="footer">
                Made with <i class="fas fa-heart"></i> by Sandesh | 2026
            </div>
        </div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');

        async function downloadVideo() {
            const url = urlInput.value.trim();
            
            if (!url) {
                showStatus('Please enter a YouTube URL 🌿', 'error');
                return;
            }
            
            if (!url.includes('youtube.com/') && !url.includes('youtu.be/')) {
                showStatus('Please enter a valid YouTube URL 🍃', 'error');
                return;
            }
            
            downloadBtn.disabled = true;
            const originalHTML = downloadBtn.innerHTML;
            downloadBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';
            showStatus('Fetching your video... 🌱', 'loading');
            
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
                
                if (!response.ok) {
                    let errorMsg = 'Download failed';
                    try {
                        const errorData = await response.json();
                        errorMsg = errorData.error || errorMsg;
                    } catch(e) {
                        errorMsg = `Server error: ${response.status}`;
                    }
                    throw new Error(errorMsg);
                }
                
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = 'video.mp4';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);
                
                showStatus('✅ Download started! Check your downloads folder.', 'success');
                urlInput.value = '';
            } catch (error) {
                showStatus('❌ ' + error.message, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = originalHTML;
                setTimeout(() => {
                    if (statusDiv.className === 'status success') {
                        statusDiv.style.display = 'none';
                    }
                }, 4000);
            }
        }

        function showStatus(message, type) {
            statusDiv.innerHTML = `<i class="fas ${type === 'loading' ? 'fa-spinner fa-pulse' : (type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle')}"></i> ${message}`;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'flex';
        }

        downloadBtn.addEventListener('click', downloadVideo);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') downloadVideo();
        });
    </script>
</body>
</html>
