<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SandeshYTDownloader | Multi-Quality YouTube Downloader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(145deg, #0a2e1f 0%, #1a4d2e 50%, #0d3b1f 100%);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        .leaf {
            position: fixed;
            font-size: 24px;
            opacity: 0.15;
            pointer-events: none;
            animation: floatLeaf 15s infinite ease-in-out;
            z-index: 0;
        }

        @keyframes floatLeaf {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -30px) rotate(5deg); }
            50% { transform: translate(-15px, -50px) rotate(-5deg); }
            75% { transform: translate(10px, -20px) rotate(3deg); }
        }

        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.25;
            animation: floatBlob 25s infinite ease-in-out;
            z-index: 0;
        }

        .blob-1 {
            background: radial-gradient(circle, #2ecc71, #27ae60);
            top: -300px;
            left: -300px;
        }

        .blob-2 {
            background: radial-gradient(circle, #1abc9c, #16a085);
            bottom: -300px;
            right: -300px;
            animation-delay: 5s;
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -30px) scale(1.1); }
            66% { transform: translate(-30px, 40px) scale(0.9); }
        }

        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.4s ease;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .developer-section {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            position: relative;
        }

        .avatar-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(46, 204, 113, 0.6);
        }

        .avatar-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #2ecc71;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: white;
        }

        .developer-info h3 {
            color: white;
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .developer-info h3 span {
            background: rgba(46, 204, 113, 0.3);
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            color: #2ecc71;
        }

        .developer-info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            font-size: 56px;
            margin-bottom: 12px;
        }

        h1 {
            font-size: 34px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a8e6cf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(46, 204, 113, 0.6);
            font-size: 18px;
        }

        input {
            width: 100%;
            padding: 18px 18px 18px 52px;
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 28px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        input:focus {
            border-color: #2ecc71;
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.2);
        }

        /* Quality Section Styles */
        .quality-section {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 28px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .section-title {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .radio-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .radio-group:last-child {
            margin-bottom: 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .radio-label:hover {
            background: rgba(46, 204, 113, 0.2);
            border-color: #2ecc71;
        }

        .radio-label input {
            display: none;
        }

        .radio-label span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
        }

        .radio-label.active {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            border-color: #2ecc71;
        }

        .radio-label.active span {
            color: white;
        }

        .format-toggle {
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 40px;
            padding: 4px;
        }

        .format-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 36px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        .format-btn.active {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .fetch-btn {
            width: 100%;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .fetch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(46, 204, 113, 0.4);
        }

        .fetch-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .video-preview {
            display: none;
            margin-top: 24px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
        }

        .video-preview.show {
            display: block;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .video-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            text-align: center;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 16px;
            margin-bottom: 16px;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            border-radius: 16px;
        }

        .download-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: white;
            border: none;
            border-radius: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(230, 126, 34, 0.4);
        }

        .download-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            animation: slideIn 0.3s ease;
        }

        .status.loading {
            display: flex;
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid rgba(46, 204, 113, 0.3);
            color: #2ecc71;
        }

        .status.success {
            display: flex;
            background: rgba(46, 204, 113, 0.2);
            border: 1px solid rgba(46, 204, 113, 0.4);
            color: #55efc4;
        }

        .status.error {
            display: flex;
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .features {
            margin-top: 32px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .feature {
            text-align: center;
            padding: 14px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 24px;
            transition: all 0.3s ease;
        }

        .feature i {
            font-size: 28px;
            margin-bottom: 8px;
            display: block;
            color: #2ecc71;
        }

        .feature span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .quality-badge {
            display: inline-block;
            background: rgba(46, 204, 113, 0.3);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            margin-left: 10px;
            color: #2ecc71;
        }

        @media (max-width: 600px) {
            .glass-card {
                padding: 32px 24px;
            }
            h1 {
                font-size: 26px;
            }
            .features {
                grid-template-columns: 1fr;
            }
            .developer-section {
                flex-direction: column;
                text-align: center;
            }
            .radio-group {
                gap: 8px;
            }
            .radio-label span {
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="leaf" style="top: 10%; left: 5%;">🍃</div>
    <div class="leaf" style="top: 70%; left: 85%;">🌿</div>
    <div class="leaf" style="top: 40%; left: 15%;">🍂</div>
    <div class="leaf" style="top: 80%; left: 20%;">🌱</div>

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="container">
        <div class="glass-card">
            <div class="developer-section">
                <div class="avatar">
                    <img src="/static/san.jpg" class="avatar-img" onerror="this.src='https://via.placeholder.com/80'">
                    <div class="avatar-badge">
                        <i class="fas fa-check"></i>
                    </div>
                </div>
                <div class="developer-info">
                    <h3>Sandesh <span>@developer</span></h3>
                    <p>
                        <i class="fas fa-home"></i> Building cool stuff
                        <i class="fas fa-music"></i>
                        <i class="fas fa-headphones"></i>
                        <i class="fas fa-tree"></i>
                    </p>
                </div>
            </div>

            <div class="logo-section">
                <div class="logo-icon">
                    <i class="fas fa-download"></i>
                </div>
                <h1>SandeshYTDownloader</h1>
                <div class="tagline">
                    <i class="fab fa-youtube"></i>
                    Choose Quality | Download Video or MP3
                    <span class="quality-badge">Up to 4K + MP3</span>
                </div>
            </div>

            <div class="input-wrapper">
                <i class="fas fa-link input-icon"></i>
                <input type="text" id="urlInput" placeholder="Paste YouTube link here..." autocomplete="off">
            </div>

            <!-- Format Toggle -->
            <div class="quality-section">
                <div class="format-toggle">
                    <div class="format-btn active" data-format="video">
                        <i class="fas fa-video"></i> Video
                    </div>
                    <div class="format-btn" data-format="audio">
                        <i class="fas fa-music"></i> Audio (MP3)
                    </div>
                </div>
            </div>

            <!-- Video Quality Options -->
            <div class="quality-section" id="videoQualitySection">
                <div class="section-title">
                    <i class="fas fa-tachometer-alt"></i> Select Video Quality
                </div>
                <div class="radio-group" id="qualityGroup">
                    <label class="radio-label" data-quality="144">
                        <input type="radio" name="quality" value="144">
                        <span>144p</span>
                    </label>
                    <label class="radio-label" data-quality="240">
                        <input type="radio" name="quality" value="240">
                        <span>240p</span>
                    </label>
                    <label class="radio-label" data-quality="360">
                        <input type="radio" name="quality" value="360">
                        <span>360p</span>
                    </label>
                    <label class="radio-label" data-quality="480">
                        <input type="radio" name="quality" value="480">
                        <span>480p</span>
                    </label>
                    <label class="radio-label active" data-quality="720">
                        <input type="radio" name="quality" value="720" checked>
                        <span>720p (HD)</span>
                    </label>
                    <label class="radio-label" data-quality="1080">
                        <input type="radio" name="quality" value="1080">
                        <span>1080p (Full HD)</span>
                    </label>
                    <label class="radio-label" data-quality="1440">
                        <input type="radio" name="quality" value="1440">
                        <span>1440p (2K)</span>
                    </label>
                    <label class="radio-label" data-quality="2160">
                        <input type="radio" name="quality" value="2160">
                        <span>2160p (4K)</span>
                    </label>
                </div>
            </div>

            <!-- Audio Quality Section (hidden by default) -->
            <div class="quality-section" id="audioQualitySection" style="display: none;">
                <div class="section-title">
                    <i class="fas fa-music"></i> Audio Settings
                </div>
                <div class="radio-group">
                    <label class="radio-label active" data-quality="mp3">
                        <input type="radio" name="audio-quality" value="mp3" checked>
                        <span>MP3 - High Quality (192kbps)</span>
                    </label>
                </div>
            </div>

            <button class="fetch-btn" id="fetchBtn">
                <i class="fas fa-search"></i>
                <span>Get Video Preview</span>
            </button>

            <div id="status" class="status"></div>

            <div id="videoPreview" class="video-preview">
                <div id="videoTitle" class="video-title"></div>
                <div id="videoContainer" class="video-container"></div>
                <button id="downloadBtn" class="download-btn">
                    <i class="fas fa-download"></i>
                    <span>Download</span>
                </button>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span>Lightning Fast</span>
                </div>
                <div class="feature">
                    <i class="fas fa-file-video"></i>
                    <span>MP4 / MP3</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span>100% Safe</span>
                </div>
            </div>

            <div class="footer">
                Made with <i class="fas fa-heart"></i> by Sandesh | 2026
            </div>
        </div>
    </div>

    <script>
        let currentVideoId = '';
        let currentTitle = '';
        let currentUrl = '';
        let currentFormatType = 'video';
        let selectedQuality = '720';

        const urlInput = document.getElementById('urlInput');
        const fetchBtn = document.getElementById('fetchBtn');
        const statusDiv = document.getElementById('status');
        const videoPreview = document.getElementById('videoPreview');
        const videoTitle = document.getElementById('videoTitle');
        const videoContainer = document.getElementById('videoContainer');
        const downloadBtn = document.getElementById('downloadBtn');
        const videoQualitySection = document.getElementById('videoQualitySection');
        const audioQualitySection = document.getElementById('audioQualitySection');

        // Format toggle logic
        document.querySelectorAll('.format-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFormatType = btn.dataset.format;
                
                if (currentFormatType === 'video') {
                    videoQualitySection.style.display = 'block';
                    audioQualitySection.style.display = 'none';
                } else {
                    videoQualitySection.style.display = 'none';
                    audioQualitySection.style.display = 'block';
                }
            });
        });

        // Quality selection logic
        document.querySelectorAll('.radio-label').forEach(label => {
            label.addEventListener('click', () => {
                if (label.parentElement.id === 'qualityGroup') {
                    document.querySelectorAll('#qualityGroup .radio-label').forEach(l => l.classList.remove('active'));
                    label.classList.add('active');
                    selectedQuality = label.dataset.quality;
                }
            });
        });

        async function fetchVideo() {
            const url = urlInput.value.trim();
            currentUrl = url;
            
            if (!url) {
                showStatus('Please enter a YouTube URL 🌿', 'error');
                return;
            }
            
            if (!url.includes('youtube.com/') && !url.includes('youtu.be/')) {
                showStatus('Please enter a valid YouTube URL 🍃', 'error');
                return;
            }
            
            fetchBtn.disabled = true;
            fetchBtn.innerHTML = '<div class="spinner"></div><span>Fetching Video...</span>';
            showStatus('Getting video info... 🌱', 'loading');
            videoPreview.classList.remove('show');
            
            try {
                const response = await fetch('/api/get-video', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: url })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Failed to fetch video');
                }
                
                const data = await response.json();
                
                if (!data.success) {
                    throw new Error(data.error || 'Failed to get video');
                }
                
                currentVideoId = data.video_id;
                currentTitle = data.title;
                
                videoTitle.innerHTML = currentTitle;
                videoContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${currentVideoId}" frameborder="0" allowfullscreen></iframe>`;
                videoPreview.classList.add('show');
                
                showStatus('✅ Video loaded! Select quality and download.', 'success');
                
            } catch (error) {
                showStatus('❌ ' + error.message, 'error');
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.innerHTML = '<i class="fas fa-search"></i><span>Get Video Preview</span>';
            }
        }

        async function downloadVideo() {
            if (!currentUrl) {
                showStatus('No video loaded. Please fetch a video first.', 'error');
                return;
            }
            
            downloadBtn.disabled = true;
            const qualityText = currentFormatType === 'video' ? selectedQuality : 'MP3';
            downloadBtn.innerHTML = `<div class="spinner"></div><span>Downloading ${qualityText}...</span>`;
            showStatus(`📥 Downloading ${qualityText} quality... This may take a moment.`, 'loading');
            
            try {
                const response = await fetch('/api/download-video', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        url: currentUrl,
                        title: currentTitle,
                        quality: selectedQuality,
                        format_type: currentFormatType
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Download failed');
                }
                
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${currentTitle}.${currentFormatType === 'video' ? 'mp4' : 'mp3'}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(downloadUrl);
                
                showStatus(`✅ Download started! ${qualityText} quality ${currentFormatType === 'video' ? 'video' : 'MP3'} saved.`, 'success');
                
            } catch (error) {
                showStatus('❌ ' + error.message, 'error');
            } finally {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = '<i class="fas fa-download"></i><span>Download</span>';
            }
        }

        function showStatus(message, type) {
            statusDiv.innerHTML = `<i class="fas ${type === 'loading' ? 'fa-spinner fa-pulse' : (type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle')}"></i> ${message}`;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'flex';
            
            setTimeout(() => {
                if (statusDiv.className === 'status success') {
                    statusDiv.style.display = 'none';
                }
            }, 5000);
        }

        fetchBtn.addEventListener('click', fetchVideo);
        downloadBtn.addEventListener('click', downloadVideo);
        urlInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchVideo();
        });
    </script>
</body>
</html>
